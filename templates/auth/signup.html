{% extends "base.html" %}

{% block title %}Sign Up - RV Technologies LTD{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="bi bi-person-plus text-primary" style="font-size: 2rem;"></i>
                        </div>
                        <h2 class="fw-bold mb-2">Create Account</h2>
                        <p class="text-muted">Join RV Technologies today</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('signup') }}">
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="name" class="form-label fw-semibold">
                                    <i class="bi bi-person me-2"></i>Full Name
                                </label>
                                <input type="text" 
                                       id="name" 
                                       name="name" 
                                       required 
                                       class="form-control form-control-lg"
                                       placeholder="Enter your full name">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label fw-semibold">
                                    <i class="bi bi-envelope me-2"></i>Email Address
                                </label>
                                <input type="email" 
                                       id="email" 
                                       name="email" 
                                       required 
                                       class="form-control form-control-lg"
                                       placeholder="Enter your email">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label fw-semibold">
                                    <i class="bi bi-telephone me-2"></i>Phone Number
                                </label>
                                <input type="tel" 
                                       id="phone" 
                                       name="phone" 
                                       required 
                                       class="form-control form-control-lg"
                                       placeholder="Enter your phone">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label fw-semibold">
                                    <i class="bi bi-lock me-2"></i>Password
                                </label>
                                <input type="password" 
                                       id="password" 
                                       name="password" 
                                       required 
                                       minlength="6"
                                       class="form-control form-control-lg"
                                       placeholder="Min 6 characters">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="address" class="form-label fw-semibold">
                                    <i class="bi bi-geo-alt me-2"></i>Address (Optional)
                                </label>
                                <input type="text" 
                                       id="address" 
                                       name="address" 
                                       class="form-control form-control-lg"
                                       placeholder="Enter your address">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">
                            Already have an account? 
                            <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-semibold">Sign In</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
