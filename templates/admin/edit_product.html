{% extends "base.html" %}

{% block title %}Edit Product - Admin{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="mb-4">
        <a href="{{ url_for('admin_products') }}" class="text-decoration-none">
            <i class="bi bi-arrow-left me-2"></i>Back to Products
        </a>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow-lg">
                <div class="card-body p-4">
                    <h2 class="fw-bold mb-4">
                        <i class="bi bi-pencil me-2"></i>Edit Product
                    </h2>
                    
                    <form method="POST" action="{{ url_for('admin_edit_product', product_id=product.id) }}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Product Name *</label>
                            <input type="text" 
                                   id="name" 
                                   name="name" 
                                   value="{{ product.name }}"
                                   required
                                   class="form-control form-control-lg">
                        </div>
                        
                        <div class="mb-3">
                            <label for="price" class="form-label fw-semibold">Price (RWF) *</label>
                            <input type="number" 
                                   id="price" 
                                   name="price" 
                                   value="{{ product.price }}"
                                   step="0.01"
                                   required
                                   min="0"
                                   class="form-control form-control-lg">
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold">Description</label>
                            <textarea id="description" 
                                      name="description" 
                                      rows="4"
                                      class="form-control">{{ product.description or '' }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="category_id" class="form-label fw-semibold">Category *</label>
                            <select id="category_id" 
                                    name="category_id" 
                                    required
                                    class="form-select form-select-lg">
                                <option value="">Select Category</option>
                                {% for category in categories %}
                                    <option value="{{ category.id }}" {% if product.category_id == category.id %}selected{% endif %}>
                                        {{ category.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="stock" class="form-label fw-semibold">Stock Quantity *</label>
                            <input type="number" 
                                   id="stock" 
                                   name="stock" 
                                   value="{{ product.stock }}"
                                   required
                                   min="0"
                                   class="form-control form-control-lg">
                        </div>
                        
                        <div class="mb-3">
                            <label for="image" class="form-label fw-semibold">Product Image</label>
                            {% if product.image %}
                                <div class="mb-2">
                                    <img src="{{ url_for('static', filename='images/' + product.image) }}" 
                                         alt="{{ product.name }}" 
                                         class="rounded"
                                         style="width: 150px; height: 150px; object-fit: cover;">
                                </div>
                            {% endif %}
                            <input type="file" 
                                   id="image" 
                                   name="image" 
                                   accept="image/*"
                                   class="form-control form-control-lg">
                            <small class="text-muted">Leave empty to keep current image</small>
                        </div>
                        
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" 
                                       type="checkbox" 
                                       name="trending" 
                                       id="trending"
                                       {% if product.trending %}checked{% endif %}>
                                <label class="form-check-label fw-semibold" for="trending">
                                    Mark as Trending
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="bi bi-save me-2"></i>Update Product
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
